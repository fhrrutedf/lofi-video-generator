version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: lofi
      POSTGRES_PASSWORD: lofi_pass
      POSTGRES_DB: lofidb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lofi -d lofidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # API Server
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://lofi:lofi_pass@db:5432/lofidb
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - KIE_API_KEY=${KIE_API_KEY:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
    volumes:
      - ./output:/app/output
      - ./temp:/app/temp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn lofi_gen.api_v2:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://lofi:lofi_pass@db:5432/lofidb
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - KIE_API_KEY=${KIE_API_KEY:-}
      - PEXELS_API_KEY=${PEXELS_API_KEY:-}
    volumes:
      - ./output:/app/output
      - ./temp:/app/temp
    depends_on:
      - db
      - redis
    command: celery -A lofi_gen.tasks worker --loglevel=info --concurrency=2

  # Celery Beat (for scheduled tasks)
  beat:
    build: .
    environment:
      - DATABASE_URL=postgresql://lofi:lofi_pass@db:5432/lofidb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    command: celery -A lofi_gen.tasks beat --loglevel=info

  # Setup Web UI (for initial configuration)
  setup:
    build: .
    ports:
      - "8502:8502"
    volumes:
      - ./.env:/app/.env
      - /var/run/docker.sock:/var/run/docker.sock
    command: streamlit run lofi_gen/setup_web.py --server.address 0.0.0.0 --server.port 8502

  # Streamlit Web UI
  web:
    build: .
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run lofi_gen/web/__init__.py --server.address 0.0.0.0 --server.port 8501

volumes:
  postgres_data:
  redis_data:
